apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-activity-logger
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-activity-logger
  template:
    metadata:
      labels:
        app: user-activity-logger
    spec:
      containers:
        - name: app
          image: user-activity-logger
          imagePullPolicy: Never
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
            - name: KAFKA_BROKER
              value: "kafka:9092"
            - name: KAFKA_TOPIC
              value: "activity-logs"
            # - name: MONGO_URI
            #   value: "YOUR_MONGO_URI"